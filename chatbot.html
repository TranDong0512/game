<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 AI Tử Vi & Tarot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            height: 100vh;
            height: 100dvh;
            display: flex;
            overflow: hidden
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0d0d2b, #12122e);
            border-right: 1px solid rgba(255, 255, 255, .06);
            display: flex;
            flex-direction: column;
            flex-shrink: 0
        }

        .side-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, .06)
        }

        .side-logo {
            font-size: 28px;
            margin-bottom: 4px
        }

        .side-title {
            font-size: 15px;
            font-weight: 600;
            color: #c4a0ff
        }

        .side-sub {
            font-size: 11px;
            color: #666;
            margin-top: 2px
        }

        .side-nav {
            flex: 1;
            padding: 12px;
            overflow-y: auto
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all .2s;
            margin-bottom: 4px;
            font-size: 13px;
            color: #999
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, .04);
            color: #ccc
        }

        .nav-item.active {
            background: rgba(140, 100, 255, .12);
            color: #c4a0ff;
            border: 1px solid rgba(140, 100, 255, .15)
        }

        .nav-icon {
            font-size: 18px;
            width: 24px;
            text-align: center
        }

        .nav-label {
            flex: 1
        }

        .nav-badge {
            font-size: 10px;
            background: rgba(140, 100, 255, .2);
            color: #c4a0ff;
            padding: 2px 8px;
            border-radius: 10px
        }

        .side-footer {
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, .06);
            font-size: 10px;
            color: #444;
            text-align: center
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #08081a
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(10, 10, 30, .8);
            backdrop-filter: blur(10px)
        }

        .chat-header-icon {
            font-size: 24px
        }

        .chat-header-info {
            flex: 1
        }

        .chat-header-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff
        }

        .chat-header-status {
            font-size: 11px;
            color: #38ef7d;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #38ef7d;
            border-radius: 50%;
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        .chat-header-actions {
            display: flex;
            gap: 6px
        }

        .header-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .03);
            color: #888;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, .08);
            color: #fff
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth
        }

        .msg {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn .3s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg.bot {
            align-self: flex-start
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0
        }

        .msg.bot .msg-avatar {
            background: linear-gradient(135deg, #6a3de8, #9b6bff)
        }

        .msg.user .msg-avatar {
            background: linear-gradient(135deg, #2a8af5, #5ba8ff)
        }

        .msg-content {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            position: relative
        }

        .msg.bot .msg-content {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .06);
            border-bottom-left-radius: 4px;
            color: #ddd
        }

        .msg.user .msg-content {
            background: linear-gradient(135deg, #6a3de8, #8b5cf6);
            color: #fff;
            border-bottom-right-radius: 4px
        }

        .msg-time {
            font-size: 10px;
            color: #555;
            margin-top: 4px
        }

        .msg.user .msg-time {
            text-align: right
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 14px;
            align-self: flex-start
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite
        }

        .typing-dot:nth-child(2) {
            animation-delay: .2s
        }

        .typing-dot:nth-child(3) {
            animation-delay: .4s
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0)
            }

            30% {
                transform: translateY(-6px)
            }
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px
        }

        .quick-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(140, 100, 255, .25);
            background: rgba(140, 100, 255, .08);
            color: #c4a0ff;
            font-size: 12px;
            cursor: pointer;
            transition: all .2s
        }

        .quick-btn:hover {
            background: rgba(140, 100, 255, .2);
            border-color: rgba(140, 100, 255, .4)
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 8px 0
        }

        .chat-card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all .3s
        }

        .chat-card:hover {
            border-color: #8c64ff;
            background: rgba(140, 100, 255, .1);
            transform: translateY(-2px)
        }

        .chat-card-icon {
            font-size: 28px;
            margin-bottom: 4px
        }

        .chat-card-name {
            font-size: 11px;
            color: #bbb;
            font-weight: 500
        }

        .tarot-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 8px 0
        }

        .tarot-card {
            background: linear-gradient(135deg, #1a1a3a, #2a1a4a);
            border: 2px solid rgba(140, 100, 255, .2);
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all .3s;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center
        }

        .tarot-card:hover {
            border-color: #8c64ff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(140, 100, 255, .3)
        }

        .tarot-card.revealed {
            border-color: #ffd700;
            background: linear-gradient(135deg, #2a2a1a, #3a2a1a)
        }

        .tarot-back {
            font-size: 24px
        }

        .tarot-front {
            font-size: 11px;
            color: #ffd700;
            font-weight: 600
        }

        .input-area {
            padding: 14px 20px;
            border-top: 1px solid rgba(255, 255, 255, .06);
            background: rgba(10, 10, 30, .8);
            backdrop-filter: blur(10px)
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end
        }

        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 100px;
            transition: border-color .2s
        }

        .input-field:focus {
            border-color: rgba(140, 100, 255, .4)
        }

        .input-field::placeholder {
            color: #555
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6a3de8, #8b5cf6);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(140, 100, 255, .4)
        }

        .send-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none
        }

        .welcome {
            text-align: center;
            padding: 30px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center
        }

        .welcome-icon {
            font-size: 60px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px
        }

        .welcome-sub {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
            max-width: 400px
        }

        .welcome-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px
        }

        .welcome-card {
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 14px;
            padding: 18px 12px;
            cursor: pointer;
            transition: all .3s;
            text-align: center
        }

        .welcome-card:hover {
            border-color: #8c64ff;
            background: rgba(140, 100, 255, .08);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(140, 100, 255, .15)
        }

        .welcome-card-icon {
            font-size: 32px;
            margin-bottom: 8px
        }

        .welcome-card-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px
        }

        .welcome-card-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.4
        }

        .reading-box {
            background: linear-gradient(135deg, rgba(140, 100, 255, .08), rgba(100, 50, 200, .05));
            border: 1px solid rgba(140, 100, 255, .15);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0
        }

        .reading-title {
            font-size: 14px;
            font-weight: 600;
            color: #c4a0ff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .reading-text {
            font-size: 12px;
            color: #bbb;
            line-height: 1.7
        }

        .reading-highlight {
            color: #ffd700;
            font-weight: 500
        }

        .reading-stars {
            color: #ffd700;
            font-size: 14px;
            margin: 6px 0
        }

        .reading-lucky {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap
        }

        .lucky-item {
            background: rgba(255, 215, 0, .08);
            border: 1px solid rgba(255, 215, 0, .15);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 11px;
            color: #ffd700
        }

        .api-banner {
            background: linear-gradient(135deg, rgba(255, 200, 0, .1), rgba(255, 100, 0, .05));
            border: 1px solid rgba(255, 200, 0, .2);
            border-radius: 10px;
            padding: 10px 14px;
            margin: 8px 0;
            font-size: 11px;
            color: #ffcc00
        }

        .api-input {
            width: 100%;
            background: rgba(0, 0, 0, .3);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 12px;
            font-family: monospace;
            outline: none;
            margin-top: 6px
        }

        .api-input:focus {
            border-color: rgba(255, 200, 0, .4)
        }

        .api-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 200, 0, .3);
            background: rgba(255, 200, 0, .1);
            color: #ffcc00;
            font-size: 11px;
            cursor: pointer;
            margin-top: 6px;
            transition: all .2s
        }

        .api-btn:hover {
            background: rgba(255, 200, 0, .2)
        }

        .messages::-webkit-scrollbar {
            width: 4px
        }

        .messages::-webkit-scrollbar-track {
            background: transparent
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .1);
            border-radius: 2px
        }

        .side-nav::-webkit-scrollbar {
            width: 3px
        }

        .side-nav::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 2px
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
            z-index: 99;
            -webkit-tap-highlight-color: transparent
        }

        .hamburger-btn {
            display: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .03);
            color: #888;
            font-size: 16px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0
        }

        .hamburger-btn:hover {
            background: rgba(255, 255, 255, .08);
            color: #fff
        }

        @media(max-width:768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: -290px;
                width: 280px;
                height: 100%;
                z-index: 100;
                transition: left .3s ease
            }

            .sidebar.open {
                left: 0
            }

            .sidebar-overlay.show {
                display: block
            }

            .hamburger-btn {
                display: flex
            }

            .chat-area {
                width: 100%;
                min-height: 0
            }

            .input-area {
                flex-shrink: 0;
                padding: 10px 12px;
                padding-bottom: max(10px, env(safe-area-inset-bottom))
            }

            .input-field {
                min-height: 38px;
                font-size: 16px
            }

            .send-btn {
                width: 38px;
                height: 38px;
                font-size: 15px
            }
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="side-header">
            <div class="side-logo">🔮</div>
            <div class="side-title">AI Tử Vi & Tarot</div>
            <div class="side-sub">Tính toán + AI diễn giải</div>
        </div>
        <div class="side-nav">
            <div class="nav-item active" onclick="showHome()"><span class="nav-icon">🏠</span><span
                    class="nav-label">Trang chủ</span></div>
            <div class="nav-item" onclick="startChat('tuvi')"><span class="nav-icon">🐉</span><span class="nav-label">Tử
                    Vi</span><span class="nav-badge">AI</span></div>
            <div class="nav-item" onclick="startChat('zodiac')"><span class="nav-icon">♈</span><span
                    class="nav-label">Cung Hoàng Đạo</span><span class="nav-badge">AI</span></div>
            <div class="nav-item" onclick="startChat('tarot')"><span class="nav-icon">🃏</span><span
                    class="nav-label">Bói Tarot</span><span class="nav-badge">AI</span></div>
            <div class="nav-item" onclick="startChat('numerology')"><span class="nav-icon">🔢</span><span
                    class="nav-label">Thần Số Học</span><span class="nav-badge">AI</span></div>
            <div class="nav-item" onclick="startChat('palm')"><span class="nav-icon">✋</span><span class="nav-label">Xem
                    Chỉ Tay</span></div>
            <div class="nav-item" onclick="startChat('dream')"><span class="nav-icon">💭</span><span
                    class="nav-label">Giải Mã Giấc Mơ</span><span class="nav-badge">AI</span></div>
            <div class="nav-item" onclick="startChat('love')"><span class="nav-icon">💕</span><span
                    class="nav-label">Tình Yêu</span><span class="nav-badge">AI</span></div>
            <div class="nav-item" onclick="showSettings()"><span class="nav-icon">⚙️</span><span class="nav-label">Cài
                    đặt AI</span></div>
        </div>
        <div class="side-footer">✨ Tính toán thuật toán + Gemini AI ✨</div>
    </div>
    <div class="chat-area">
        <div class="chat-header">
            <div class="hamburger-btn" id="hamburger" onclick="toggleSidebar()">☰</div>
            <div class="chat-header-icon">🔮</div>
            <div class="chat-header-info">
                <div class="chat-header-name" id="hName">AI Tử Vi & Tarot</div>
                <div class="chat-header-status"><span class="status-dot"></span> <span id="hStatus">Sẵn sàng</span>
                </div>
            </div>
            <div class="chat-header-actions">
                <div class="header-btn" onclick="clearChat()" title="Mới">🗑️</div>
            </div>
        </div>
        <div class="messages" id="msgs"></div>
        <div class="input-area">
            <div class="input-row"><textarea class="input-field" id="inp" placeholder="Nhập tin nhắn..." rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea><button
                    class="send-btn" id="sBtn" onclick="sendMsg()">➤</button></div>
        </div>
    </div>
    <script>
        // ==================== AI CONFIG ====================
        let GEMINI_KEY = localStorage.getItem('gemini_key') || '';

        async function callAI(prompt) {
            if (!GEMINI_KEY) return null;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if (data.error) { console.error('Gemini Error:', data.error.message); return null; }
                return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
            } catch (e) { console.error('AI Error:', e); return null; }
        }

        async function askAI(prompt, onResult) {
            showTyping();
            try {
                const ai = await callAI(prompt);
                hideTyping();
                if (ai) { onResult(ai); return true; }
                addMsg('bot', '⚠️ AI không phản hồi. Kiểm tra lại API key trong ⚙️ Cài đặt.');
                return true;
            } catch (e) { console.error('askAI error:', e); }
            hideTyping();
            addMsg('bot', '⚠️ Lỗi kết nối AI. Thử lại sau.');
            return true;
        }

        // ==================== SIDEBAR TOGGLE ====================
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            sb.classList.toggle('open');
            ov.classList.toggle('show');
        }

        // ==================== CALCULATION ALGORITHMS ====================
        // Tử Vi: Can Chi + Ngũ Hành + Cung Mệnh
        function calcCanChi(year) {
            const cans = ['Giáp', 'Ất', 'Bính', 'Đinh', 'Mậu', 'Kỷ', 'Canh', 'Tân', 'Nhâm', 'Quý'];
            const chis = ['Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi', 'Thân', 'Dậu', 'Tuất', 'Hợi'];
            const elements = ['Mộc', 'Mộc', 'Hỏa', 'Hỏa', 'Thổ', 'Thổ', 'Kim', 'Kim', 'Thủy', 'Thủy'];
            const canIdx = (year - 4) % 10;
            const chiIdx = (year - 4) % 12;
            return {
                can: cans[canIdx], chi: chis[chiIdx], element: elements[canIdx],
                canIdx, chiIdx, nguHanh: elements[canIdx]
            };
        }

        // Tử Vi: Tính Cung Mệnh theo tháng sinh + giờ sinh
        function calcCungMenh(birthMonth, birthHour) {
            // Giờ Tý = 23h-1h, Sửu = 1h-3h, ...
            const gioIdx = Math.floor(((birthHour + 1) % 24) / 2);
            const gioNames = ['Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi', 'Thân', 'Dậu', 'Tuất', 'Hợi'];
            // Cung Mệnh = (Tháng sinh + Giờ sinh) mod 12
            const cungIdx = (birthMonth - 1 + gioIdx) % 12;

            <b>💕 Thời điểm tốt:</b> ${lv.season} - Đây là lúc tình cảm nở rộ nhất<br>
            <b>💑 Tuổi hợp:</b> ${bestMatches}<br>
            <b>💡 Lời khuyên:</b> ${lv.tip}<br><br>
            <b>📅 Vận tình duyên 2025:</b><br>
            • Mùa xuân: Gặp gỡ mới, mở lòng<br>
            • Mùa hè: Củng cố mối quan hệ<br>
            • Mùa thu: Thấu hiểu sâu sắc<br>
            • Mùa đông: Bình yên, hạnh phúc
        </div><div class="reading-stars">★★★★☆</div></div>`);
            } else if (state.step === 'love_compat') {
                const years = input.split(/[,\s]+/).map(Number).filter(n => !isNaN(n));
                if (years.length < 2) { botSay('⚠️ Nhập 2 năm (VD: 1995, 1997):'); return; }
                const c1 = calcCanChi(years[0]), c2 = calcCanChi(years[1]);
                const compatChart = {
                    'Tý': { 'Thân': 95, 'Thìn': 90, 'Tỵ': 85, 'Sửu': 80, 'Dậu': 75, 'Ngọ': 70, 'Hợi': 65, 'Mão': 60, 'Mùi': 55, 'Tuất': 50, 'Dần': 45 },
                    'Sửu': { 'Tỵ': 95, 'Dậu': 90, 'Tý': 85, 'Thân': 80, 'Thìn': 75, 'Hợi': 70, 'Mão': 65, 'Mùi': 60, 'Ngọ': 55, 'Tuất': 50, 'Dần': 45 },
                    'Dần': { 'Ngọ': 95, 'Tuất': 90, 'Hợi': 85, 'Mão': 80, 'Mùi': 75, 'Tý': 70, 'Thân': 65, 'Thìn': 60, 'Tỵ': 55, 'Dậu': 50, 'Sửu': 45 },
                    'Mão': { 'Mùi': 95, 'Hợi': 90, 'Tuất': 85, 'Dần': 80, 'Ngọ': 75, 'Tý': 70, 'Thân': 65, 'Thìn': 60, 'Tỵ': 55, 'Dậu': 50, 'Sửu': 45 },
                    'Thìn': { 'Tý': 95, 'Thân': 90, 'Tỵ': 85, 'Sửu': 80, 'Dậu': 75, 'Ngọ': 70, 'Hợi': 65, 'Mão': 60, 'Mùi': 55, 'Tuất': 50, 'Dần': 45 },
                    'Tỵ': { 'Sửu': 95, 'Dậu': 90, 'Thân': 85, 'Tý': 80, 'Thìn': 75, 'Hợi': 70, 'Mão': 65, 'Mùi': 60, 'Ngọ': 55, 'Tuất': 50, 'Dần': 45 },
                    'Ngọ': { 'Dần': 95, 'Tuất': 90, 'Mão': 85, 'Hợi': 80, 'Mùi': 75, 'Tý': 70, 'Thân': 65, 'Thìn': 60, 'Tỵ': 55, 'Dậu': 50, 'Sửu': 45 },
                    'Mùi': { 'Mão': 95, 'Hợi': 90, 'Ngọ': 85, 'Dần': 80, 'Tuất': 75, 'Tý': 70, 'Thân': 65, 'Thìn': 60, 'Tỵ': 55, 'Dậu': 50, 'Sửu': 45 },
                    'Thân': { 'Tý': 95, 'Thìn': 90, 'Tỵ': 85, 'Sửu': 80, 'Dậu': 75, 'Ngọ': 70, 'Hợi': 65, 'Mão': 60, 'Mùi': 55, 'Tuất': 50, 'Dần': 45 },
                    'Dậu': { 'Sửu': 95, 'Tỵ': 90, 'Thân': 85, 'Tý': 80, 'Thìn': 75, 'Hợi': 70, 'Mão': 65, 'Mùi': 60, 'Ngọ': 55, 'Tuất': 50, 'Dần': 45 },
                    'Tuất': { 'Dần': 95, 'Ngọ': 90, 'Mão': 85, 'Hợi': 80, 'Mùi': 75, 'Tý': 70, 'Thân': 65, 'Thìn': 60, 'Tỵ': 55, 'Dậu': 50, 'Sửu': 45 },
                    'Hợi': { 'Mão': 95, 'Mùi': 90, 'Dần': 85, 'Tuất': 80, 'Ngọ': 75, 'Tý': 70, 'Thân': 65, 'Thìn': 60, 'Tỵ': 55, 'Dậu': 50, 'Sửu': 45 }
                };
                const score = (compatChart[c1.chi] && compatChart[c1.chi][c2.chi]) || (50 + Math.floor(Math.random() * 40));
                const verdict = score >= 90 ? 'Cực kỳ hợp nhau! Đôi uyên ương hoàn hảo' : score >= 75 ? 'Rất hợp nhau, bổ trợ lẫn nhau' : score >= 60 ? 'Khá hợp, cần thấu hiểu' : 'Cần nỗ lực nhiều hơn để hòa hợp';
                let html = `<div class="reading-box"><div class="reading-title">👫 ${c1.can} ${c1.chi} (${years[0]}) & ${c2.can} ${c2.chi} (${years[1]})</div><div class="reading-text">
            <b>Điểm hợp:</b> <span class="reading-highlight">${score}/100</span><br>
            <div class="reading-stars">${score >= 85 ? '★★★★★' : score >= 70 ? '★★★★☆' : score >= 55 ? '★★★☆☆' : '★★☆☆☆'}</div><br>
            <b>Kết luận:</b> ${verdict}<br><br>
            <b>💡 Lời khuyên:</b><br>
            ${score >= 80 ? 'Hai bạn rất hợp nhau, hãy珍惜 mối quan hệ này!' : 'Cùng nhau vun đắp, thấu hiểu và sẻ chia sẽ giúp tình yêu bền vững.'}
        </div></div>`;
                addMsg('user', input); botSay('⏳ Đang phân tích...', '', 0);
                if (GEMINI_KEY) {
                    await askAI(`Phân tích sự hợp nhau giữa tuổi ${c1.can} ${c1.chi} (${years[0]}) và ${c2.can} ${c2.chi} (${years[1]}). Điểm: ${score}/100. Diễn giải chi tiết. Tiếng Việt, 150 từ.`, ai => { html += `<div class="reading-box"><div class="reading-title">🤖 AI Phân Tích</div><div class="reading-text">${ai.replace(/\n/g, '<br>')}</div></div>`; });
                }
                hideTyping(); addMsg('bot', html);
            }
            setTimeout(() => addMsg('bot', 'Bạn muốn xem thêm?', qa([{ l: '💕 Xem lại', a: "startChat('love')" }, { l: '🔮 Tử vi', a: "startChat('tuvi')" }])), 2000);
        }

        // ==================== PALM ====================
        function startPalm() {
            state = { step: 'gender' };
            botSay('✋ <b>Xem Chỉ Tay</b><br><br>Bạn là:', qa([{ l: '👨 Nam', a: "doPalm('male')" }, { l: '👩 Nữ', a: "doPalm('female')" }]));
        }
        async function doPalm(g) {
            addMsg('user', g === 'male' ? '👨 Nam' : '👩 Nữ');
            const hand = g === 'male' ? 'tay trái' : 'tay phải';
            const pick = a => a[Math.floor(Math.random() * a.length)];
            const readings = {
                life: ['Dài và sâu: Sức khỏe dồi dào, sống thọ.', 'Ngắn nhưng rõ: Sống chất lượng.', 'Có nhiều nhánh: Cuộc sống đa dạng.'],
                heart: ['Cong lên: Lãng mạn, lạc quan.', 'Thẳng: Thực tế, lý trí.', 'Dài: Yêu sâu sắc, chung thủy.'],
                head: ['Dài: Tư duy sâu sắc.', 'Cong: Sáng tạo, nghệ sĩ.', 'Thẳng: Logic, quyết đoán.'],
                fate: ['Rõ ràng: Mục tiêu rõ ràng.', 'Không có: Tự tạo vận mệnh.', 'Đứt đoạn: Nhiều thay đổi.']
            };
            const lifeR = pick(readings.life), heartR = pick(readings.heart), headR = pick(readings.head), fateR = pick(readings.fate);

            if (GEMINI_KEY) {
                const prompt = `Bạn là nhà chiêm tinh học chuyên về xem chỉ tay. Dựa trên thông tin sau, hãy diễn giải chi tiết về vận mệnh, tính cách, tình yêu, sự nghiệp của người xem. Trả lời tiếng Việt, khoảng 150 từ.
                Tay: ${hand}
                Đường Sinh Mệnh: ${lifeR}
                Đường Tình Duyên: ${heartR}
                Đường Trí Não: ${headR}
                Đường Số Phận: ${fateR}`;
                let html = '';
                await askAI(prompt, ai => { html = `<div class="reading-box"><div class="reading-title">✋ Chỉ Tay ${hand}</div><div class="reading-text">${ai.replace(/\n/g, '<br>')}</div></div>`; });
                hideTyping(); addMsg('bot', html);
            } else {
                const html = `<div class="reading-box"><div class="reading-title">✋ Chỉ Tay ${hand}</div><div class="reading-text">
        <b>📏 Đường Sinh Mệnh:</b> ${lifeR}<br>
        <b>💕 Đường Tình Duyên:</b> ${heartR}<br>
        <b>🧠 Đường Trí Não:</b> ${headR}<br>
        <b>🎯 Đường Số Phận:</b> ${fateR}
    </div><div class="reading-stars">★★★★☆</div></div>`;
                hideTyping(); addMsg('bot', html);
            }
        }

        // ==================== PIAN ====================
        function sendMsg() {
            const text = $('inp').value.trim(); if (!text) return;
            $('inp').value = ''; $('inp').style.height = 'auto';
            addMsg('user', text);

            switch (mode) {
                case 'tuvi': handleTuVi(text); break;
                case 'zodiac': handleZodiac(text); break;
                case 'tarot': handleTarot(text); break;
                case 'numerology':
                    if (state.step === 'name') { handleNumerologyName(text); }
                    else { handleNumerology(text); }
                    break;
                case 'dream': handleDream(text); break;
                case 'love': handleLove(text); break;
                case 'palm': botSay('Chọn giới tính ở trên.'); break;
                default: handleGeneral(text);
            }
        }
        async function handleGeneral(text) {
            const l = text.toLowerCase();
            if (l.includes('tử vi') || l.includes('tu vi')) startChat('tuvi');
            else if (l.includes('tarot') || l.includes('bói')) startChat('tarot');
            else if (l.includes('cung') || l.includes('zodiac')) startChat('zodiac');
            else if (l.includes('số') || l.includes('numerology')) startChat('numerology');
            else if (l.includes('mơ') || l.includes('giấc mơ')) startChat('dream');
            else if (l.includes('tình') || l.includes('yêu')) startChat('love');
            else if (l.includes('chỉ tay')) startChat('palm');
            else if (l.includes('xin chào') || l.includes('hello') || l.includes('chào')) {
                if (GEMINI_KEY) {
                    const used = await askAI(`Bạn là AI Tử Vi & Tarot thông minh, thân thiện. Người dùng chào bạn bằng "${text}". Hãy chào lại một cách tự nhiên, thân thiện bằng tiếng Việt. Giới thiệu ngắn gọn về các khả năng của bạn: xem tử vi, bói tarot, thần số học, giải mã giấc mơ, xem tình yêu, xem chỉ tay.`, ai => { addMsg('bot', ai.replace(/\n/g, '<br>')); });
                    if (used) return;
                }
                botSay('Xin chào! 👋 Tôi là AI Tử Vi & Tarot. Tôi có thể giúp bạn xem tử vi, bói tarot, thần số học, giải mã giấc mơ và nhiều hơn nữa!', qa([
                    { l: '🐉 Xem tử vi', a: "startChat('tuvi')" }, { l: '♈ Cung hoàng đạo', a: "startChat('zodiac')" },
                    { l: '🃏 Bói tarot', a: "startChat('tarot')" }, { l: '🔢 Thần số học', a: "startChat('numerology')" }
                ]));
            }
            else if (l.includes('cảm ơn') || l.includes('thank')) {
                if (GEMINI_KEY) {
                    const used = await askAI(`Bạn là AI Tử Vi & Tarot. Người dùng cảm ơn bạn bằng "${text}". Hãy đáp lại một cách tự nhiên, thân thiện bằng tiếng Việt.`, ai => { addMsg('bot', ai.replace(/\n/g, '<br>')); });
                    if (used) return;
                }
                botSay('Không có gì! 😊 Nếu bạn cần xem thêm bất kỳ gì, hãy cho tôi biết nhé!', qa([
                    { l: '🐉 Tử vi', a: "startChat('tuvi')" }, { l: '💕 Tình yêu', a: "startChat('love')" },
                    { l: '💭 Giải mã giấc mơ', a: "startChat('dream')" }
                ]));
            }
            else if (GEMINI_KEY) {
                const quickBtns = qa([
                    { l: '🐉 Tử Vi', a: "startChat('tuvi')" }, { l: '♈ Cung Hoàng Đạo', a: "startChat('zodiac')" },
                    { l: '🃏 Tarot', a: "startChat('tarot')" }, { l: '🔢 Thần Số Học', a: "startChat('numerology')" },
                    { l: '💭 Giấc Mơ', a: "startChat('dream')" }, { l: '💕 Tình Yêu', a: "startChat('love')" }
                ]);
                const used = await askAI(`Bạn là AI Tử Vi & Tarot thông minh, am hiểu về tử vi, phong thủy, bói toán, tâm linh. Người dùng hỏi: "${text}". Hãy trả lời một cách chi tiết, thân thiện bằng tiếng Việt. Nếu câu hỏi liên quan đến tử vi/tarot/số học, hãy gợi ý người dùng chọn chức năng tương ứng.`, ai => { addMsg('bot', ai.replace(/\n/g, '<br>') + '<br><br>' + quickBtns); });
                if (used) return;
                botSay('Tôi có thể giúp bạn!', quickBtns);
            }
            else botSay('Tôi có thể giúp bạn!', qa([
                { l: '🐉 Tử Vi', a: "startChat('tuvi')" }, { l: '♈ Cung Hoàng Đạo', a: "startChat('zodiac')" },
                { l: '🃏 Tarot', a: "startChat('tarot')" }, { l: '🔢 Thần Số Học', a: "startChat('numerology')" },
                { l: '💭 Giấc Mơ', a: "startChat('dream')" }, { l: '💕 Tình Yêu', a: "startChat('love')" }
            ]));
        }

        // Auto-resize
        $('inp').addEventListener('input', function () { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });

        // Start
        showHome();
    </script>
</body>

</html>
