    <script>
        // ==================== AI CONFIG ====================
        let GEMINI_KEY = localStorage.getItem('gemini_key') || '';

        async function callAI(prompt) {
            if (!GEMINI_KEY) return null;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
            } catch (e) { console.error('AI Error:', e); return null; }
        }

        // ==================== CALCULATION ALGORITHMS ====================
        // Tử Vi: Can Chi + Ngũ Hành + Cung Mệnh
        function calcCanChi(year) {
            const cans = ['Giáp', 'Ất', 'Bính', 'Đinh', 'Mậu', 'Kỷ', 'Canh', 'Tân', 'Nhâm', 'Quý'];
            const chis = ['Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi', 'Thân', 'Dậu', 'Tuất', 'Hợi'];
            const elements = ['Mộc', 'Mộc', 'Hỏa', 'Hỏa', 'Thổ', 'Thổ', 'Kim', 'Kim', 'Thủy', 'Thủy'];
            const canIdx = (year - 4) % 10;
            const chiIdx = (year - 4) % 12;
            return {
                can: cans[canIdx], chi: chis[chiIdx], element: elements[canIdx],
                canIdx, chiIdx, nguHanh: elements[canIdx]
            };
        }

        // Tử Vi: Tính Cung Mệnh theo tháng sinh + giờ sinh
        function calcCungMenh(birthMonth, birthHour) {
            // Giờ Tý = 23h-1h, Sửu = 1h-3h, ...
            const gioIdx = Math.floor(((birthHour + 1) % 24) / 2);
            const gioNames = ['Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi', 'Thân', 'Dậu', 'Tuất', 'Hợi'];
            // Cung Mệnh = (Tháng sinh + Giờ sinh) mod 12
            const cungIdx = (birthMonth - 1 + gioIdx) % 12;
            const cungNames = ['Mệnh', 'Huynh Đệ', 'Phu Thê', 'Tài Bạch', 'Tật Ách', 'Nô Bộc', 'Thiên Di', 'Quan Lộc', 'Điền Trạch', 'Phụ Mẫu', 'Phúc Đức', 'Tử Nữ'];
            return { cung: cungNames[cungIdx], gio: gioNames[gioIdx], gioIdx, cungIdx };
        }

        // Tử Vi: Tính Sao Tử Vi theo ngày sinh
        function calcSaoTuVi(birthDay) {
            // Đơn giản hóa: vị trí sao Tử Vi theo ngày sinh
            const viTri = birthDay % 12;
            const saoChinh = ['Tử Vi', 'Thiên Cơ', 'Thái Dương', 'Vũ Khúc', 'Thiên Đồng', 'Liêm Trinh',
                'Thiên Phủ', 'Thái Âm', 'Tham Lang', 'Cự Môn', 'Thiên Tướng', 'Thiên Lương'];
            return saoChinh[viTri];
        }

        // Tử Vi: Tính Ngũ Hành bản mệnh
        function calcNguHanhMenh(element, chiIdx) {
            const nạpAm = {
                'Tý': 'Thủy', 'Sửu': 'Thổ', 'Dần': 'Mộc', 'Mão': 'Mộc', 'Thìn': 'Thổ', 'Tỵ': 'Hỏa',
                'Ngọ': 'Hỏa', 'Mùi': 'Thổ', 'Thân': 'Kim', 'Dậu': 'Kim', 'Tuất': 'Thổ', 'Hợi': 'Thủy'
            };
            const chi = ['Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi', 'Thân', 'Dậu', 'Tuất', 'Hợi'];
            return nạpAm[chi[chiIdx]];
        }

        // Tử Vi: Tính Ngũ Hành hợp/kỵ
        function calcHopKy(element) {
            const hop = { 'Mộc': 'Hỏa', 'Hỏa': 'Thổ', 'Thổ': 'Kim', 'Kim': 'Thủy', 'Thủy': 'Mộc' };
            const sinh = { 'Thủy': 'Mộc', 'Mộc': 'Hỏa', 'Hỏa': 'Thổ', 'Thổ': 'Kim', 'Kim': 'Thủy' };
            const khac = { 'Mộc': 'Thổ', 'Thổ': 'Thủy', 'Thủy': 'Hỏa', 'Hỏa': 'Kim', 'Kim': 'Mộc' };
            return { sinh: sinh[element], hop: hop[element], biKhac: khac[element] };
        }

        // Tử Vi: Tính Vận Hạn năm
        function calcVanHan(year, currentYear) {
            const tuoi = currentYear - year;
            const hanIdx = tuoi % 12;
